<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>Popup</title>
</head>
<body>
<header>
    <div class="navigation-menu">
        <ul class="navigation-list">
            <li class="navigation-item">
                <a tabindex="0" href="#">Mail</a>
            </li>
            <li class="navigation-item">
                <a tabindex="0" href="#">Images</a>
            </li>
            <li tabindex="0" class="navigation-item button-item">
                <label  for="checked">
                    <span class="checkbox-img"></span>
                </label>
                <input type="checkbox" class="custom-checkbox" id="checked">
                <p class="triangle-cloud"></p>
                <div tabindex="-1" class="popup-menu">
                    <ul class="popup-list">
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/calendar.png" width=25 height=25 alt="">
                                <br>
                                Calendar
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/mail.png" width=25 height=25 alt="">
                                <br>
                                Mail
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/news.png" width=25 height=25 alt="">
                                <br>
                                News
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/maps.png" width=25 height=25 alt="">
                                <br>
                                Map
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/files.png" width=25 height=25 alt="">
                                <br>
                                Files
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/contacts.png" width=25 height=25 alt="">
                                <br>
                                Contacts
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/tanslation.png" width=25 height=25 alt="">
                                <br>
                                Translate
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/videos.png" width=25 height=25 alt="">
                                <br>
                                Videos
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/search.png" width=25 height=25 alt="">
                                <br>
                                Search
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/photos.png" width=25 height=25 alt="">
                                <br>
                                Photo
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/apps.png" width=25 height=25 alt="">
                                <br>
                                Apps
                            </a>
                        </li>
                        <li class="popup-item">
                            <a href="#">
                                <img src="icons/documents.png" width=25 height=25 alt="">
                                <br>
                                Document
                            </a>
                        </li>
                    </ul>
                    <div class="more-button">
                        <input type="checkbox" id="more-button" class="custom-checkbox">
                        <label tabindex="0" for="more-button">
                            <span>► <b>More</b></span>
                        </label>
                        <ul class="more-list">
                            <li class="popup-item">
                                <a href="#">
                                    <img src="icons/chat.png" width=25 height=25 alt="">
                                    <br>
                                    Chat
                                </a>
                            </li>
                            <li class="popup-item">
                                <a href="#">
                                    <img src="icons/classroom.png" width=25 height=25 alt="">
                                    <br>
                                    Classroom
                                </a>
                            </li>
                            <li class="popup-item">
                                <a href="#">
                                    <img src="icons/collection.png" width=25 height=25 alt="">
                                    <br>
                                    Collection
                                </a>
                            </li>
                        </ul>
                        <p class="more-link">
                            <a href="#">Even more from link</a>
                        </p>
                    </div>

                </div>

            </li>
            <li class="navigation-item button-item">
                <a tabindex="0" href="#">
                    <img src="images/bell.png" alt="Notifications" width="35" height="35">
                </a>
            </li>
            <li class="navigation-item button-item">
                <a tabindex="0" href="#">
                    <img src="images/profile.png" alt="Account profile image" width="35" height="35">
                </a>
            </li>
        </ul>
    </div>
</header>
<main>
</main>
</body>
</html>
